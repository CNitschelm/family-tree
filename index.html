<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nitschelm Family Tree — Visual</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500;600&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F5F6F2; --panel:#FFFFFF; --ink:#1F2A33; --ink-soft:#5B6770; --rule:#C9CEC6;
  --fr:#3E6B4F; --us-east:#34558B; --us-west:#B0432F; --schw:#6E4B7A; --you:#B8860B; --sel:#0E7C7B;
}
html.dark{
  --paper:#15191C; --panel:#1E2428; --ink:#E7EBEA; --ink-soft:#98A3A6; --rule:#3B4448;
  --fr:#6FAE8A; --us-east:#7EA2DB; --us-west:#D97B62; --schw:#B18BC4; --you:#D9A93F; --sel:#4FC8C6;
}
html.dark #sync{background:rgba(21,25,28,.85)}
html.dark .node .box{box-shadow:0 1px 2px rgba(0,0,0,.4)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh}
body{background:var(--paper);color:var(--ink);font-family:'Archivo',system-ui,sans-serif;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--panel);border-bottom:2px solid var(--ink);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;z-index:10}
header h1{font-family:'EB Garamond',serif;font-weight:600;font-size:19px;white-space:nowrap;margin-right:4px}
header input{font:inherit;font-size:13px;color:var(--ink);padding:6px 10px;border:1px solid var(--rule);border-radius:6px;width:180px;background:var(--panel)}
header input::placeholder{color:var(--ink-soft)}
header input:focus{outline:2px solid var(--us-east)}
header button{font:inherit;font-size:12px;font-weight:600;color:var(--ink);padding:6px 11px;border:1px solid var(--ink);border-radius:6px;background:var(--panel);cursor:pointer;white-space:nowrap}
#searchwrap{position:relative}
#suggest{position:absolute;top:100%;left:0;margin-top:4px;min-width:250px;max-height:290px;overflow:auto;background:var(--panel);border:1px solid var(--rule);border-radius:8px;box-shadow:0 6px 18px rgba(31,42,51,.18);display:none;z-index:30}
#suggest .it{padding:7px 12px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:baseline;gap:12px;white-space:nowrap}
#suggest .it .nm2{overflow:hidden;text-overflow:ellipsis}
#suggest .it .nm2 small{color:var(--ink-soft);font-size:11px}
#suggest .it .yr{color:var(--ink-soft);font-size:11.5px;flex-shrink:0}
#suggest .it.act{background:var(--paper)}
#suggest .none{padding:7px 12px;font-size:12px;color:var(--ink-soft)}
.jumps{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.jumps .lbl{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.vsep{width:1px;height:24px;background:var(--ink-soft);margin:0 6px}
.jumps button{border-width:1px;font-weight:500}
.jumps button.b-leg{border-color:var(--you);color:var(--you)}
.jumps button.b-fr{border-color:var(--fr);color:var(--fr)}
.jumps button.b-east{border-color:var(--us-east);color:var(--us-east)}
.jumps button.b-west{border-color:var(--us-west);color:var(--us-west)}
.jumps button.b-schw{border-color:var(--schw);color:var(--schw)}
.jumps button.b-leg.on{background:var(--you);color:#fff}
.jumps button.b-fr.on{background:var(--fr);color:#fff}
.jumps button.b-east.on{background:var(--us-east);color:#fff}
.jumps button.b-west.on{background:var(--us-west);color:#fff}
.jumps button.b-schw.on{background:var(--schw);color:#fff}
#hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(31,42,51,.88);color:#fff;font-size:12px;padding:7px 14px;border-radius:16px;cursor:pointer;transition:opacity .4s;z-index:5;max-width:90%;text-align:center}
#stage{flex:1;position:relative;overflow:hidden;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none}
#stage.dragging{cursor:grabbing}
svg{position:absolute;inset:0;width:100%;height:100%;z-index:0}
#cards{position:absolute;left:0;top:0;width:0;height:0;transform-origin:0 0;z-index:1;touch-action:none}
.edge{fill:none;stroke:var(--rule);stroke-width:1.6}
.edge.lit{stroke:var(--you);stroke-width:2.4}
.edge.dim{opacity:.15}
.ulabel{font-size:10px;fill:var(--ink-soft);font-family:'Archivo',sans-serif}
.node{position:absolute;cursor:pointer}
.node .box{
  background:var(--panel);border:1px solid var(--rule);border-radius:8px;
  padding:6px 9px 5px 12px;width:100%;height:100%;overflow:hidden;position:relative;
  box-shadow:0 1px 2px rgba(31,42,51,.08);display:flex;flex-direction:column;
}
.node .box::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--bc,var(--rule))}
.node .nm{font-family:'EB Garamond',serif;font-weight:600;font-size:13.5px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node .yrs{font-size:10.5px;line-height:1.25;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node .sp{font-size:10px;line-height:1.3;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node .sp b{color:var(--ink);font-weight:500}
.node .sp .mar,#suggest .mar{font-size:1.15em;line-height:1;color:var(--ink-soft)}
.node .hd{display:flex;gap:7px;align-items:center;min-width:0}
.node .hd .hdt{min-width:0;flex:1}
.node .av{width:26px;height:26px;border-radius:50%;object-fit:cover;background:var(--paper);border:1px solid var(--rule);flex:none}
.node .ni{color:var(--ink-soft);font-size:8px;margin-left:4px;border:1px solid var(--rule);border-radius:50%;display:inline-block;width:11px;height:11px;line-height:11px;text-align:center;vertical-align:1px;box-sizing:border-box}
#tip{position:absolute;max-width:290px;background:var(--ink);color:var(--paper);font-size:11.5px;line-height:1.45;padding:7px 11px;border-radius:6px;pointer-events:none;display:none;z-index:7;box-shadow:0 3px 10px rgba(31,42,51,.3)}
#tip i{opacity:.82}
#sync{position:absolute;left:10px;bottom:10px;font-size:10px;color:var(--ink-soft);z-index:4;background:rgba(245,246,242,.85);padding:2px 7px;border-radius:4px}
#profile{position:fixed;inset:0;background:rgba(21,25,28,.55);display:none;align-items:center;justify-content:center;z-index:60;padding:18px}
#profile .pcard{background:var(--panel);color:var(--ink);border:1px solid var(--rule);border-radius:14px;max-width:520px;width:100%;max-height:86vh;max-height:84dvh;overflow:auto;overscroll-behavior:contain;padding:26px 28px;box-shadow:0 12px 40px rgba(0,0,0,.35);position:relative}
#profile .pclose{position:absolute;top:10px;right:14px;font-size:22px;cursor:pointer;color:var(--ink-soft);background:none;border:none}
#profile .phead{display:flex;gap:14px;align-items:center;margin-bottom:10px}
#profile .phead img{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--you);flex:none}
#profile h2{font-family:'EB Garamond',serif;font-size:24px;font-weight:600;line-height:1.15}
#profile .psub{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
#profile .pbio p{font-size:13px;line-height:1.55;margin:8px 0}
#profile h3{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-soft);margin:14px 0 6px}
#profile .ptl{margin-left:5px;padding-left:16px;border-left:2px solid var(--rule)}
#profile .ptl .ent{position:relative;margin-bottom:10px;font-size:12.5px;line-height:1.4}
#profile .ptl .ent::before{content:"";position:absolute;left:-21.5px;top:3px;width:7px;height:7px;border-radius:50%;background:var(--you);border:2px solid var(--panel)}
#profile .ptl .yr{font-weight:700;font-size:11px;color:var(--ink);letter-spacing:.4px;font-variant-numeric:tabular-nums}
#profile .ptl .tt{color:var(--ink-soft)}
#profile .plinks a{color:var(--us-east);font-size:12.5px;margin-right:12px;display:inline-block;margin-bottom:4px}
.node .av.hasbio{border:2px solid var(--you);cursor:pointer}
#sync a{color:var(--ink-soft)}
#sync .ext{font-size:9px;vertical-align:1px}
.node .badge{font-size:8px;font-weight:700;letter-spacing:.4px;color:#fff;background:var(--you);border-radius:8px;padding:1px 6px;text-transform:uppercase;margin-left:5px;vertical-align:1px;display:inline-block;line-height:1.4}
.node .prow{margin-top:auto;display:flex;gap:6px;justify-content:center}
.node .pill{
  font-size:10px;font-weight:700;color:var(--ink-soft);
  border:1px solid var(--rule);border-radius:9px;padding:0 8px;line-height:15px;background:var(--paper);
}
.node .pill.biochip{border-color:var(--you);color:var(--you)}
.node.lit .box{outline:2px solid var(--you);box-shadow:0 2px 8px rgba(184,134,11,.3)}
.node.sel .box{outline:3px solid var(--sel);outline-offset:2px;box-shadow:0 0 0 6px rgba(14,124,123,.20),0 4px 14px rgba(14,124,123,.5)}
.node.dim{opacity:.16}
#ruler{position:absolute;left:0;top:0;bottom:0;width:78px;pointer-events:none;z-index:4}
#genlines{position:absolute;inset:0;pointer-events:none;z-index:0}
#genlines .genline{position:absolute;left:0;right:0;border-top:1px dashed var(--rule);opacity:.75}
#ruler .g{position:absolute;left:8px;font-size:10px;color:var(--ink-soft);background:var(--paper);border:1px solid var(--rule);border-radius:5px;padding:2px 7px;line-height:1.25;white-space:nowrap;box-shadow:0 1px 4px rgba(31,42,51,.2)}
#ruler .g b{display:block;font-size:1.05em;color:var(--ink);font-weight:600}
#zoomctl{position:absolute;right:14px;bottom:14px;display:flex;flex-direction:column;gap:6px;z-index:5}
#zoomctl button{width:34px;height:34px;font-size:17px;color:var(--ink);border:1px solid var(--ink);border-radius:7px;background:var(--panel);cursor:pointer}
#lock{position:fixed;inset:0;background:var(--paper);display:none;align-items:center;justify-content:center;z-index:100}
#lock .box{background:var(--panel);border:1px solid var(--rule);border-left:4px solid var(--you);border-radius:12px;padding:30px 34px;text-align:center;width:min(340px,86vw);box-shadow:0 8px 30px rgba(31,42,51,.15)}
#lock h2{font-family:'EB Garamond',serif;font-weight:600;font-size:22px;margin-bottom:6px;color:var(--ink)}
#lock p{font-size:13px;color:var(--ink-soft);margin-bottom:16px}
#lock input{font:inherit;font-size:16px;color:var(--ink);background:var(--paper);border:1px solid var(--rule);border-radius:6px;padding:9px 12px;width:100%;text-align:center;margin-bottom:10px}
#lock button{font:inherit;font-size:13px;font-weight:600;color:var(--paper);background:var(--ink);border:none;border-radius:6px;padding:9px 18px;cursor:pointer;width:100%}
#lock .err{color:#C62828;font-size:12px;min-height:16px;margin-top:8px}
html.dark #lock .err{color:#EF9A9A}
/* hover styles only on devices that truly hover — on touch, :hover sticks after a
   tap and made toggled-off filter buttons still look selected */
@media(hover:hover){
  header button:hover{background:var(--ink);color:var(--paper)}
  .jumps button.b-leg:hover{background:var(--you);color:#fff}
  .jumps button.b-fr:hover{background:var(--fr);color:#fff}
  .jumps button.b-east:hover{background:var(--us-east);color:#fff}
  .jumps button.b-west:hover{background:var(--us-west);color:#fff}
  .jumps button.b-schw:hover{background:var(--schw);color:#fff}
  .node .pill:hover{border-color:var(--ink);color:var(--ink);background:var(--panel)}
  #zoomctl button:hover{background:var(--ink);color:var(--paper)}
  #sync a:hover{color:var(--ink)}
}
@media(pointer:coarse){
  .node .pill{line-height:24px;font-size:11.5px;padding:0 14px}
  #profile .pclose{font-size:28px;padding:10px 14px;top:2px;right:2px} /* 44px-class touch target */
  #profile .pcard{padding:24px 20px}
  header button{padding:9px 13px;font-size:13px}
  #zoomctl button{width:42px;height:42px;font-size:20px}
}
@media(max-width:720px){
  header{padding:6px 10px;gap:8px}
  header h1{display:none}
  #searchwrap{flex:1;min-width:0}
  header input{width:100%;font-size:16px} /* 16px stops iOS auto-zoom on focus */
  .jumps{flex:1 0 100%;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .jumps .lbl{display:none}
  #ruler{width:54px}
  #ruler .g{padding:1px 5px}
  #zoomctl{top:10px;right:10px;bottom:auto;flex-direction:row}
  #hint{bottom:36px;font-size:11px} /* above the footer; the bottom info sheet it once avoided is gone */
}
</style>
</head>

<div id="lock"><div class="box"><h2>Nitschelm Family Tree</h2><p id="lockmsg">This family tree is password protected.</p><input id="lockpw" type="password" autocomplete="current-password"><button id="lockbtn">Unlock</button><div class="err" id="lockerr"></div></div></div>

<header>
  <h1>Nitschelm Family Tree</h1>
  <div id="searchwrap">
    <input id="search" type="search" placeholder="Search a name…" autocomplete="off">
    <div id="suggest"></div>
  </div>
  <div class="jumps">
    <span class="lbl">Filter:</span>
    <button class="b-leg" data-jump="legacy">Legacy</button>
    <button class="b-fr" data-jump="fr">France</button>
    <button class="b-east" data-jump="east">US East</button>
    <button class="b-west" data-jump="west">Oregon</button>
    <button class="b-schw" data-jump="schw">Schweitzer</button>
  </div>
  <span class="vsep"></span>
  <button id="fit">Fit view</button>
  <button id="reset">Reset</button>
  <button id="lang" title="Français / English">🌐 FR</button>
  <button id="theme" title="Light / dark">🌙</button>
</header>

<div id="stage">
  <div id="genlines"></div>
  <svg id="svg"><g id="world"></g></svg>
  <div id="cards"></div>
  <div id="ruler"></div>
  <div id="hint">Click a person to open their family and trace their line · click the background or “Reset” to start over · drag / scroll to move</div>
  <div id="zoomctl">
    <button id="zin" aria-label="Zoom in">+</button>
    <button id="zout" aria-label="Zoom out">−</button>
  </div>
  <div id="tip"></div>
  <div id="sync"><span id="statstxt"></span> · <span id="synctxt"></span> · <a href="https://corynitschelm.com" target="_blank" rel="noopener">corynitschelm.com <span class="ext">↗</span></a></div>
</div>

<!-- bio overlay lives OUTSIDE #stage so map pan/zoom/pointer-capture can't hijack its events -->
<div id="profile"><div class="pcard"><button class="pclose" id="pclose" aria-label="Close">×</button><div id="pbody"></div></div></div>

const b64b = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
async function deriveKey(pw){
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt:b64b(ENC.salt), iterations:ENC.iter, hash:"SHA-256"}, km, {name:"AES-GCM", length:256}, true, ["decrypt"]);
}
async function decryptData(key){
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64b(ENC.iv)}, key, b64b(ENC.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
const lockEl = document.getElementById("lock");
function showLock(){
  document.getElementById("lockmsg").textContent = T("pwmsg");
  document.getElementById("lockbtn").textContent = T("pwbtn");
  lockEl.style.display = "flex";
  document.getElementById("lockpw").focus();
}
async function tryUnlock(){
  const pwEl = document.getElementById("lockpw");
  if(!pwEl.value) return;
  try{
    const key = await deriveKey(pwEl.value);
    const data = await decryptData(key);
    try{ localStorage.setItem("ft-key", btoa(String.fromCharCode(...new Uint8Array(await crypto.subtle.exportKey("raw", key))))); }catch(_){}
    lockEl.style.display = "none";
    boot(data);
  }catch(_){
    document.getElementById("lockerr").textContent = T("pwerr");
    pwEl.select();
  }
}
document.getElementById("lockbtn").onclick = tryUnlock;
document.getElementById("lockpw").addEventListener("keydown", e=>{ if(e.key==="Enter") tryUnlock(); });
/* theme for the lock screen (boot re-applies incl. the toggle icon) */
try{
  const th = localStorage.getItem("ft-theme") || "system";
  const dark = th==="dark" || (th!=="light" && window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches);
  document.documentElement.classList.toggle("dark", dark);
}catch(_){}
(async function(){
  try{
    const raw = localStorage.getItem("ft-key");
    if(!raw) return showLock();
    const key = await crypto.subtle.importKey("raw", b64b(raw), {name:"AES-GCM"}, true, ["decrypt"]);
    boot(await decryptData(key));
  }catch(_){ try{ localStorage.removeItem("ft-key"); }catch(__){} showLock(); }
})();

function boot(DATA){
/* ---------------- Build ---------------- */
const NODE_W = 240, LEVEL_H = 132, GAP_X = 22;
let idc = 0;
const allNodes = [];
function build(p, branch, parent, gen){
  const b = p.branch || branch;
  const n = { id:++idc, p, branch:b, parent, children:[], gen, open:false };
  allNodes.push(n);
  (p.unions||[]).forEach((u,ui)=>{
    (u.c||[]).forEach(ch=>{
      const cn = build(ch, b, n, gen+1);
      cn.unionIdx = ui; cn.unionSpouse = u.s || null;
      n.children.push(cn);
    });
  });
  return n;
}
const root = build(DATA, "legacy", null, 0);
(function cnt(n){ n.desc = n.children.length; n.children.forEach(c=>{ cnt(c); n.desc += c.desc; }); })(root);

/* expand a node and cascade through single-child runs until a fork or leaf */
function openRun(n){
  n.open = true;
  let c = n;
  while(c.children.length === 1){ c = c.children[0]; c.open = true; }
  return c;
}
function openPathTo(n){ let a=n.parent; while(a){ a.open=true; a=a.parent; } }
function findPerson(pred){ return allNodes.find(pred); }

/* filters: "legacy" = the trunk down to the split point; the rest are full branches.
   Open state is recomputed as the union of all active filters.
   Anchors are stable ids carried INSIDE the encrypted data — no names in this layer. */
const trunkFork = findPerson(n=>n.p.anchor==="trunk");
const BRANCH_HEADS = {
  fr:   findPerson(n=>n.p.anchor==="fr"),
  east: findPerson(n=>n.p.anchor==="east"),
  west: findPerson(n=>n.p.anchor==="west"),
  schw: findPerson(n=>n.p.anchor==="schw")
};
function walkDown(n,f){ f(n); n.children.forEach(c=>walkDown(c,f)); }
function openAll(n){ walkDown(n, x=>{ if(x.children.length) x.open=true; }); }
const activeFilters = new Set(["legacy"]);
let visSet = null; /* explicit whitelist of visible nodes; keeps branch paths narrow */
function allowSubtree(n){ if(visSet) walkDown(n, x=>visSet.add(x.id)); }
function allowPathUp(n){ if(!visSet) return; let a=n; while(a){ visSet.add(a.id); a=a.parent; } }
function setOpenFromFilters(){
  allNodes.forEach(n=>n.open=false);
  visSet = new Set([root.id]);
  if(activeFilters.has("legacy")){
    openRun(root);                       /* progenitor down to the first fork */
    if(trunkFork) openRun(trunkFork);    /* …and on to the split point where the branches begin */
    (function reach(x){ visSet.add(x.id); if(x.open) x.children.forEach(reach); })(root);
  }
  Object.entries(BRANCH_HEADS).forEach(([k,n])=>{
    if(!activeFilters.has(k) || !n) return;
    openPathTo(n);      /* open the direct line to the branch head… */
    allowPathUp(n);     /* …but only whitelist the line itself, not siblings */
    openAll(n);
    allowSubtree(n);
  });
}
function initView(){ activeFilters.clear(); activeFilters.add("legacy"); setOpenFromFilters(); }
initView();

/* generation ruler data: min birth year per generation across the whole dataset */
const genYear = {};
allNodes.forEach(n=>{
  const m = (n.p.years||"").match(/\d{4}/);
  if(m){ const y=+m[0]; if(!(n.gen in genYear) || y<genYear[n.gen]) genYear[n.gen]=y; }
});

/* ---------------- Layout (visible nodes only; y = true generation) ---------------- */
const COARSE = window.matchMedia && matchMedia("(pointer:coarse)").matches;
const PILL_H = COARSE ? 28 : 20;
let nodes=[], edges=[];
function visChildren(n){ return n.open ? n.children.filter(c=>!visSet || visSet.has(c.id)) : []; }
/* uniform card height: size every card to fit the busiest one (the 4 remarriage cards) */
const UNIFORM_H = Math.max(...allNodes.map(n=>{
  const sp = (n.p.unions||[]).filter(u=>u.s).length;
  return 42 + Math.min(sp,2)*14 + (sp>2?14:0) + PILL_H;
}));
function nodeHeight(){ return UNIFORM_H; }
function layout(){
  nodes=[]; edges=[];
  let cursor = 0;
  (function place(n){
    n.h = nodeHeight(n);
    const kids = visChildren(n);
    if(!kids.length){ n.x = cursor; cursor += NODE_W + GAP_X; }
    else{
      kids.forEach(place);
      n.x = (kids[0].x + kids[kids.length-1].x)/2;
    }
    n.y = n.gen * LEVEL_H;
    nodes.push(n);
    kids.forEach(k=>edges.push([n,k]));
  })(root);
}

/* ---------------- Render ---------------- */
const world = document.getElementById("world");
const cards = document.getElementById("cards");
const stage = document.getElementById("stage");
function esc(s){return String(s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]))}
function fmtYears(y){
  if(!y) return "";
  if(LANG==="fr") return y.replace(/^b\. /,"n. ").replace("16th c.","XVIe s.");
  return y;
}
const BC = {legacy:"var(--you)",fr:"var(--fr)","us-east":"var(--us-east)","us-west":"var(--us-west)",schw:"var(--schw)"};

function render(){
  layout();
  world.innerHTML = "";
  cards.innerHTML = "";
  edges.forEach(([a,b])=>{
    const x1=a.x+NODE_W/2, y1=a.y+a.h, x2=b.x+NODE_W/2, y2=b.y;
    const midY = y1 + (y2-y1)/2;
    const path = document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",`M${x1},${y1} V${midY} H${x2} V${y2}`);
    path.setAttribute("class","edge");
    path.dataset.a=a.id; path.dataset.b=b.id;
    world.appendChild(path);
    if(b.unionSpouse && (a.p.unions||[]).filter(u=>u.s).length>1){
      const t = document.createElementNS("http://www.w3.org/2000/svg","text");
      t.setAttribute("x", x2+8); t.setAttribute("y", y2-9); /* clear of the selection outline+glow */
      t.setAttribute("class","ulabel");
      t.textContent = "w/ " + b.unionSpouse.split(" ")[0];
      world.appendChild(t);
    }
  });
  nodes.forEach(n=>{
    const d = document.createElement("div");
    d.className = "node";
    d.dataset.id = n.id;
    d.style.left = n.x+"px"; d.style.top = n.y+"px";
    d.style.width = NODE_W+"px"; d.style.height = n.h+"px";
    const p = n.p;
    let sp = "";
    (p.unions||[]).forEach(u=>{ if(u.s) sp += `<div class="sp"><span class="mar">⚭</span> <b>${esc(u.s)}</b>${u.sy?" ("+esc(u.sy)+")":""}${u.div?" ÷":""}</div>`; });
    const badge = p.tag==="author" ? `<span class="badge" style="background:var(--fr)">${T("author")}</span>` : p.tag==="emig" ? `<span class="badge" style="background:var(--us-east)">→ USA</span>` : p.tag==="mem" ? `<span class="badge" style="background:#7A7F84">✝</span>` : "";
    const pill = n.children.length ? `<div class="pill" data-pill="1">${n.open ? T("hide") : "+"+n.children.length+(n.desc>n.children.length?" → "+n.desc:"")}</div>` : "";
    const bioChip = p.profile ? `<div class="pill biochip" data-bio="1">👤 ${T("profile_btn")}</div>` : "";
    const prow = (bioChip || pill) ? `<div class="prow">${bioChip}${pill}</div>` : "";
    const ni = `<span class="ni">i</span>`; /* visibility decided after layout (notes OR truncation) */
    d.innerHTML = `<div class="box" style="--bc:${BC[n.branch]}"><div class="hd"><img class="av${p.profile?" hasbio":""}" src="${p.img||AV}" alt="" loading="lazy"><div class="hdt"><div class="nm">${esc(p.name)}</div><div class="yrs">${esc(fmtYears(p.years))}${badge}${ni}</div></div></div>${sp}${prow}</div>`;
    cards.appendChild(d);
    n.el = d;
  });
  /* tooltip eligibility: only when there's extra info (notes) or something got clipped */
  nodes.forEach(n=>{
    if(!n.el) return;
    const clipped = [...n.el.querySelectorAll(".nm,.yrs,.sp")].some(el=>el.scrollWidth > el.clientWidth + 1);
    n.tipWorthy = !!noteText(n) || clipped;
    const niEl = n.el.querySelector(".ni");
    if(niEl) niEl.style.display = n.tipWorthy ? "" : "none";
  });
  renderRuler();
  reapplyHL();
  syncJumpBtns();
}

/* ---------------- Generation ruler ---------------- */
const ruler = document.getElementById("ruler");
const genlines = document.getElementById("genlines");
let rulerLabels = [];
function renderRuler(){
  ruler.innerHTML = "";
  genlines.innerHTML = "";
  rulerLabels = [];
  const gens = [...new Set(nodes.map(n=>n.gen))].sort((a,b)=>a-b);
  gens.forEach(g=>{
    const d = document.createElement("div");
    d.className = "g";
    const era = g===0 ? "1500s" : (genYear[g] ? "~"+genYear[g] : "");
    d.innerHTML = `<b>${T("gen")} ${g+1}</b>${era}`;
    ruler.appendChild(d);
    const ln = document.createElement("div");
    ln.className = "genline";
    genlines.appendChild(ln);
    rulerLabels.push({el:d, line:ln, gen:g});
  });
  positionRuler();
}
function positionRuler(){
  const fs = Math.max(9, Math.min(22, 10*scale)); /* gen labels grow/shrink with zoom */
  const showLines = LEVEL_H*scale > 44;           /* hide rules when rows get too dense */
  rulerLabels.forEach(({el,line,gen})=>{
    el.style.top = (ty + (gen*LEVEL_H+6)*scale) + "px";
    el.style.fontSize = fs + "px";
    line.style.top = (ty + (gen*LEVEL_H - 10)*scale) + "px";
    line.style.display = showLines ? "block" : "none";
  });
}

/* ---------------- Pan / zoom ---------------- */
let tx=0, ty=0, scale=1;
function apply(){
  world.setAttribute("transform",`translate(${tx},${ty}) scale(${scale})`);
  cards.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  positionRuler();
  positionTip();
}
let raf=null;
function scheduleApply(){ if(raf)return; raf=requestAnimationFrame(()=>{raf=null;apply();}); }

function bbox(){
  let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
  nodes.forEach(n=>{minX=Math.min(minX,n.x);maxX=Math.max(maxX,n.x+NODE_W);minY=Math.min(minY,n.y);maxY=Math.max(maxY,n.y+n.h);});
  return {minX,maxX,minY,maxY};
}
const rulerW = ()=> ruler.getBoundingClientRect().width;
function fit(){
  /* always fit the whole visible tree — pinch/zoom in from there */
  const b=bbox(), RW=rulerW(), W=stage.clientWidth, H=stage.clientHeight;
  const s = Math.min((W-RW)/(b.maxX-b.minX+60), H/(b.maxY-b.minY+80), 1.1);
  scale = s;
  tx = RW + (W-RW - (b.maxX-b.minX)*s)/2 - b.minX*s;
  ty = 24 - b.minY*s;
  apply();
}
function centerOn(n, targetScale){
  scale = targetScale || Math.max(scale, .85);
  tx = (stage.clientWidth+rulerW())/2 - (n.x+NODE_W/2)*scale;
  ty = stage.clientHeight*0.28 - n.y*scale;
  apply();
}

const ptrs = new Map();
let moved=false, panStart=null, pinchPrev=null;
const rect = ()=>stage.getBoundingClientRect();
function pinchState(){
  const [a,b] = [...ptrs.values()];
  return { d: Math.hypot(a.x-b.x,a.y-b.y), cx:(a.x+b.x)/2, cy:(a.y+b.y)/2 };
}
const TAP_SLOP = COARSE ? 12 : 5;
let downTarget=null;
stage.addEventListener("pointerdown",e=>{
  if(e.target.closest("#zoomctl")||e.target.closest("#sync"))return; /* don't start a pan on the footer link */
  try{ stage.setPointerCapture(e.pointerId); }catch(_){}
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===1){
    panStart={x:e.clientX,y:e.clientY,tx,ty}; moved=false; downTarget=e.target;
    stage.classList.add("dragging");
  } else if(ptrs.size===2){
    panStart=null; pinchPrev=pinchState(); moved=true; downTarget=null;
  }
});
stage.addEventListener("pointermove",e=>{
  if(!ptrs.has(e.pointerId))return;
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===1 && panStart){
    const dx=e.clientX-panStart.x, dy=e.clientY-panStart.y;
    if(Math.abs(dx)+Math.abs(dy)>TAP_SLOP)moved=true;
    tx=panStart.tx+dx; ty=panStart.ty+dy; scheduleApply();
  } else if(ptrs.size===2 && pinchPrev){
    const cur=pinchState(), r=rect();
    const f = cur.d/pinchPrev.d;
    const mx=cur.cx-r.left, my=cur.cy-r.top;
    tx = mx-(mx-tx)*f + (cur.cx-pinchPrev.cx);
    ty = my-(my-ty)*f + (cur.cy-pinchPrev.cy);
    scale = Math.min(Math.max(scale*f, .04), 3);
    pinchPrev=cur; scheduleApply();
  }
});
function endPtr(e){
  ptrs.delete(e.pointerId);
  if(ptrs.size===1){
    const p=[...ptrs.values()][0];
    panStart={x:p.x,y:p.y,tx,ty}; pinchPrev=null;
  } else if(ptrs.size===0){
    panStart=null; pinchPrev=null; downTarget=null; stage.classList.remove("dragging");
  }
}
stage.addEventListener("pointerup",e=>{
  const wasTap = ptrs.has(e.pointerId) && ptrs.size===1 && !moved && downTarget;
  const tapTarget = downTarget;
  endPtr(e);
  if(wasTap) handleTap(tapTarget, e.clientX, e.clientY);
});
stage.addEventListener("pointercancel",endPtr);
stage.addEventListener("lostpointercapture",endPtr);
stage.addEventListener("wheel",e=>{
  e.preventDefault();
  const intensity = e.ctrlKey ? .015 : .0022;
  const f = Math.exp(-e.deltaY*intensity);
  const r=rect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  const ns = Math.min(Math.max(scale*f, .04), 3);
  const rf = ns/scale;
  tx = mx-(mx-tx)*rf; ty = my-(my-ty)*rf; scale=ns; scheduleApply();
},{passive:false});
function zoomStep(f){
  const W=stage.clientWidth/2, H=stage.clientHeight/2;
  const ns=Math.min(Math.max(scale*f,.04),3), rf=ns/scale;
  tx=W-(W-tx)*rf; ty=H-(H-ty)*rf; scale=ns; scheduleApply();
}
document.getElementById("zin").onclick=()=>zoomStep(1.3);
document.getElementById("zout").onclick=()=>zoomStep(1/1.3);
document.getElementById("fit").onclick=fit;

/* ---------------- Highlight ---------------- */
let hlNode = null;
let hlPinned = false; /* search selections survive background clicks */
function clearHL(){
  hlNode = null;
  hlPinned = false;
  document.querySelectorAll(".node").forEach(el=>el.classList.remove("lit","dim","sel"));
  document.querySelectorAll(".edge").forEach(el=>el.classList.remove("lit","dim"));
  hideTip();
}
document.getElementById("reset").onclick=()=>{ initView(); clearHL(); render(); fit(); };

function lineageSet(n){
  const set = new Set();
  let a=n; while(a){ set.add(a.id); a=a.parent; }
  (function down(x){ set.add(x.id); x.children.forEach(down); })(n);
  return set;
}
function highlight(n){
  hlNode = n;
  const set = lineageSet(n);
  nodes.forEach(m=>{
    if(!m.el)return;
    m.el.classList.toggle("lit", set.has(m.id));
    m.el.classList.toggle("dim", !set.has(m.id));
    m.el.classList.toggle("sel", m===n);
  });
  document.querySelectorAll(".edge").forEach(el=>{
    const on = set.has(+el.dataset.a) && set.has(+el.dataset.b);
    el.classList.toggle("lit", on); el.classList.toggle("dim", !on);
  });
  showTip(n); /* notes for the selected person (works for touch too) */
}

/* ---------------- Note tooltip (hover on desktop, selection on touch) ---------------- */
const tip = document.getElementById("tip");
let tipNode = null;
function noteText(n){
  const pick = (en, fr) => (LANG === "fr" && fr) ? fr : en; /* fall back to English */
  return [pick(n.p.note, n.p.note_fr), ...(n.p.unions||[]).map(u=>pick(u.n, u.n_fr))].filter(Boolean).join(" — ");
}
function showTip(n){
  if(!n.tipWorthy){ hideTip(); return; }
  /* mini profile: full untruncated name, years and marriages, then notes */
  const p = n.p;
  let html = `<b>${esc(p.name)}</b>`;
  const yrs = fmtYears(p.years);
  if(yrs) html += ` · ${esc(yrs)}`;
  (p.unions||[]).forEach(u=>{
    if(u.s) html += `<br>⚭ ${esc(u.s)}${u.sy ? " ("+esc(fmtYears(u.sy))+")" : ""}${u.div ? " ÷" : ""}`;
  });
  const t = noteText(n);
  if(t) html += `<br><i>${esc(t)}</i>`;
  tipNode = n;
  tip.innerHTML = html;
  tip.style.display = "block";
  positionTip();
}
function hideTip(){ tipNode = null; tip.style.display = "none"; }
function positionTip(){
  if(!tipNode) return;
  if(!nodes.includes(tipNode)){ hideTip(); return; }
  const n = tipNode, W = stage.clientWidth, H = stage.clientHeight;
  const tw = tip.offsetWidth, th = tip.offsetHeight;
  let x = tx + (n.x + NODE_W/2)*scale - tw/2;
  let y = ty + (n.y + n.h)*scale + 8;
  if(y + th > H - 8) y = ty + n.y*scale - th - 8;
  x = Math.min(Math.max(8, x), Math.max(8, W - tw - 8));
  y = Math.min(Math.max(8, y), Math.max(8, H - th - 8));
  tip.style.left = x + "px"; tip.style.top = y + "px";
}
/* ---------------- Profile pages (bio overlay; data lives in the encrypted payload) ---------------- */
const profileEl = document.getElementById("profile");
function pickL(en, fr){ return (LANG === "fr" && fr) ? fr : en; }
function openProfile(n){
  const p = n.p, pr = p.profile; if(!pr) return;
  let h = `<div class="phead"><img src="${p.img||AV}" alt=""><div><h2>${esc(p.name)}</h2><div class="psub">${esc(fmtYears(p.years))}${pr.headline ? " · " + esc(pickL(pr.headline, pr.headline_fr)) : ""}</div></div></div>`;
  h += `<div class="pbio">` + (pickL(pr.bio, pr.bio_fr) || []).map(x=>`<p>${esc(x)}</p>`).join("") + `</div>`;
  if(pr.timeline && pr.timeline.length){
    h += `<h3>${T("profile_timeline")}</h3><div class="ptl">` +
      pr.timeline.map(t=>{
        const yl = (t.y.endsWith("–") ? t.y + (LANG==="fr" ? "aujourd’hui" : "present") : t.y).replace(/–/g, " – ");
        return `<div class="ent"><div class="yr">${esc(yl)}</div><div class="tt">${esc(pickL(t.t, t.t_fr))}</div></div>`;
      }).join("") + `</div>`;
  }
  if(pr.links && pr.links.length){
    h += `<h3>${T("profile_links")}</h3><div class="plinks">` +
      pr.links.map(l=>`<a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)} ↗</a>`).join("") + `</div>`;
  }
  document.getElementById("pbody").innerHTML = h;
  profileEl.style.display = "flex";
}
function closeProfile(){ profileEl.style.display = "none"; }
document.getElementById("pclose").onclick = closeProfile;
profileEl.addEventListener("pointerdown", e=>{ if(e.target === profileEl) closeProfile(); });
window.addEventListener("keydown", e=>{ if(e.key === "Escape") closeProfile(); });

cards.addEventListener("mouseover",e=>{
  const el = e.target.closest(".node"); if(!el) return;
  const n = nodes.find(m=>m.id===+el.dataset.id);
  if(n) showTip(n);
});
/* broken/missing photo → fall back to the placeholder silhouette */
cards.addEventListener("error",e=>{
  const im = e.target;
  if(im && im.classList && im.classList.contains("av") && im.src !== AV) im.src = AV;
}, true);
cards.addEventListener("mouseout",()=>{
  if(hlNode) showTip(hlNode); else hideTip();
});
function reapplyHL(){ if(hlNode && nodes.includes(hlNode)) highlight(hlNode); else hlNode=null; }

/* ---------------- Expand / collapse ---------------- */
function toggleNode(n){
  const bx=n.x, by=n.y;
  if(n.open){ n.open=false; }
  else{ openRun(n); allowSubtree(n); } /* manual expansion always allowed */
  render();
  /* keep the clicked node where it was on screen */
  tx += (bx-n.x)*scale; ty += (by-n.y)*scale;
  apply();
}

function handleTap(target, cx, cy){
  const el = target && target.closest ? target.closest(".node") : null;
  if(!el){
    /* double-tap empty space on touch = zoom in at that point */
    const now = Date.now();
    if(COARSE && stage._lastTap && now-stage._lastTap.t<320 && Math.hypot(cx-stage._lastTap.x,cy-stage._lastTap.y)<30){
      const r=rect(), mx=cx-r.left, my=cy-r.top;
      const ns=Math.min(scale*1.6,3), rf=ns/scale;
      tx=mx-(mx-tx)*rf; ty=my-(my-ty)*rf; scale=ns; scheduleApply();
      stage._lastTap=null; return;
    }
    stage._lastTap={t:now,x:cx,y:cy};
    if(!hlPinned) clearHL(); /* pinned search selections survive background taps */
    return;
  }
  const n = nodes.find(m=>m.id===+el.dataset.id);
  if(!n)return;
  if(target.closest("[data-bio]") || (target.closest(".av") && n.p.profile)){ openProfile(n); return; }
  if(target.closest("[data-pill]")){ toggleNode(n); return; }
  if(!n.open && n.children.length){ hlPinned=false; toggleNode(n); highlight(n); return; } /* tap = open their family */
  if(hlNode===n){ clearHL(); return; } /* tap again = clear */
  hlPinned=false;
  highlight(n);
}
/* mobile browsers fire resize when the URL bar hides/shows during a swipe —
   only refit when the width actually changes (real resize / rotation) */
let lastW = window.innerWidth;
window.addEventListener("resize",()=>{
  clearTimeout(window._rz);
  window._rz=setTimeout(()=>{ if(window.innerWidth!==lastW){ lastW=window.innerWidth; fit(); } },250);
});

/* ---------------- Navigation: find me / search / branch jumps ---------------- */
function goTo(n, andHighlight){
  openPathTo(n);
  allowPathUp(n);   /* searched person must be reachable even under narrow filters */
  allowSubtree(n);
  if(n.children.length) openRun(n);
  render();
  centerOn(n, Math.max(scale,.8));
  if(andHighlight){ highlight(n); hlPinned = true; }
  else clearHL();
}

/* filter buttons: multi-select toggles; view refits after every change */
const jumpBtns = {};
document.querySelectorAll("[data-jump]").forEach(b=>{
  jumpBtns[b.dataset.jump] = b;
  b.onclick=()=>{
    const k = b.dataset.jump;
    if(activeFilters.has(k)) activeFilters.delete(k); else activeFilters.add(k);
    setOpenFromFilters();
    render();
    fit();
  };
});
function syncJumpBtns(){
  Object.entries(jumpBtns).forEach(([k,b])=>b.classList.toggle("on", activeFilters.has(k)));
}

/* search: suggestions dropdown; the tree only moves once a person is chosen */
const searchEl = document.getElementById("search");
const sugEl = document.getElementById("suggest");
let sugItems = [], sugIdx = 0, deb;
const norm = s => s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,""); /* é→e, ü→u … */
function searchMatches(q){
  q = norm(q);
  const out = [];
  for(const m of allNodes){
    if(norm(m.p.name).includes(q)){ out.push({n:m, via:null}); }
    else{
      const u = (m.p.unions||[]).find(u=>u.s && norm(u.s).includes(q));
      if(u) out.push({n:m, via:u.s});
    }
    if(out.length>=8) break;
  }
  return out;
}
function renderSuggest(){
  if(!sugItems.length){ sugEl.innerHTML = `<div class="none">${T("nomatch")}</div>`; sugEl.style.display="block"; return; }
  sugEl.innerHTML = sugItems.map((it,i)=>
    `<div class="it${i===sugIdx?" act":""}" data-i="${i}"><span class="nm2">${esc(it.n.p.name)}${it.via?` <small><span class="mar">⚭</span> ${esc(it.via)}</small>`:""}</span><span class="yr">${esc(fmtYears(it.n.p.years))}</span></div>`
  ).join("");
  sugEl.style.display="block";
}
function hideSuggest(){ sugEl.style.display="none"; sugItems=[]; sugIdx=0; }
function chooseSuggest(i){
  const it = sugItems[i]; if(!it) return;
  searchEl.value = "";     /* box resets; the highlight marks the person */
  searchEl.blur();
  hideSuggest();
  goTo(it.n, true);
}
searchEl.addEventListener("input",e=>{
  clearTimeout(deb);
  deb=setTimeout(()=>{
    const q=e.target.value.trim();
    if(!q){ hideSuggest(); return; }
    sugItems = searchMatches(q); sugIdx = 0;
    renderSuggest();
  },150);
});
searchEl.addEventListener("keydown",e=>{
  if(sugEl.style.display!=="block") return;
  if(e.key==="ArrowDown"){ e.preventDefault(); if(sugItems.length){ sugIdx=(sugIdx+1)%sugItems.length; renderSuggest(); } }
  else if(e.key==="ArrowUp"){ e.preventDefault(); if(sugItems.length){ sugIdx=(sugIdx-1+sugItems.length)%sugItems.length; renderSuggest(); } }
  else if(e.key==="Enter"){ e.preventDefault(); chooseSuggest(sugIdx); }
  else if(e.key==="Escape"){ hideSuggest(); }
});
sugEl.addEventListener("pointerdown",e=>{ e.preventDefault(); /* keep input focus */ });
/* select on click, NOT pointerdown: hiding the list on pointerdown made the
   browser's follow-up click land on whatever sat underneath (the Legacy button
   on mobile) — the ghost-click bug */
sugEl.addEventListener("click",e=>{
  const it = e.target.closest(".it");
  if(it) chooseSuggest(+it.dataset.i);
});
document.addEventListener("pointerdown",e=>{
  if(!e.target.closest("#searchwrap")) hideSuggest();
});

/* ---------------- Language ---------------- */
function applyLang(){
  document.documentElement.lang = LANG;
  searchEl.placeholder = T("search");
  document.querySelector(".jumps .lbl").textContent = T("filter");
  ["legacy","fr","east","west","schw"].forEach(k=>{ if(jumpBtns[k]) jumpBtns[k].textContent = T(k); });
  document.getElementById("fit").textContent = "⛶ " + T("fit");
  document.getElementById("reset").textContent = "↺ " + T("reset");
  document.getElementById("hint").textContent = T("hint");
  document.getElementById("synctxt").textContent = T("synced")+" "+SYNCED;
  const gens = new Set(allNodes.map(n=>n.gen)).size;
  let minY = 9999;
  allNodes.forEach(n=>{ const m=(n.p.years||"").match(/\d{4}/); if(m) minY=Math.min(minY,+m[0]); });
  document.getElementById("statstxt").textContent =
    allNodes.length+" "+T("stats_people")+" · "+gens+" "+T("stats_gens")+" · "+T("stats_since")+" "+minY;
  document.getElementById("lang").textContent = "🌐 " + (LANG==="en" ? "FR" : "EN");
  render();
}
document.getElementById("lang").onclick=()=>{
  LANG = LANG==="en" ? "fr" : "en";
  try{ localStorage.setItem("ft-lang", LANG); }catch(_){}
  applyLang();
};

/* ---------------- Theme (dark mode) ---------------- */
let THEME = "system"; /* "system" until the user chooses; then "light"/"dark" */
try{ THEME = localStorage.getItem("ft-theme") || "system"; }catch(_){}
if(!["system","light","dark"].includes(THEME)) THEME = "system";
const sysDark = window.matchMedia ? matchMedia("(prefers-color-scheme: dark)") : null;
function themeIsDark(){
  if(THEME==="dark") return true;
  if(THEME==="light") return false;
  return !!(sysDark && sysDark.matches);
}
function applyTheme(){
  document.documentElement.classList.toggle("dark", themeIsDark());
  document.getElementById("theme").textContent = themeIsDark() ? "☀️" : "🌙";
}
document.getElementById("theme").onclick=()=>{
  THEME = themeIsDark() ? "light" : "dark";
  try{ localStorage.setItem("ft-theme", THEME); }catch(_){}
  applyTheme();
};
if(sysDark && sysDark.addEventListener) sysDark.addEventListener("change", ()=>{ if(THEME==="system") applyTheme(); });

/* ---------------- Init ---------------- */
applyTheme();
applyLang();
fit();
/* onboarding hint: tap to dismiss, auto-dismiss on first interaction or after 6s */
const hintEl = document.getElementById("hint");
function dismissHint(){
  hintEl.style.opacity = 0;
  setTimeout(()=>{ hintEl.style.display = "none"; }, 450);
}
hintEl.addEventListener("pointerdown", dismissHint);
stage.addEventListener("pointerdown", function once(){ dismissHint(); stage.removeEventListener("pointerdown", once); });
setTimeout(dismissHint, 6000);

}
</script>
